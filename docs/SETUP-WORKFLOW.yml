name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secret. Set under repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preflight (site file size guard)
        run: bash scripts/preflight.sh site

      - name: Detect changed paths
        id: changes
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "site=true"   >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -q '^site/';   then echo "site=true"   >> "$GITHUB_OUTPUT"; else echo "site=false"   >> "$GITHUB_OUTPUT"; fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -q '^worker/'; then echo "worker=true" >> "$GITHUB_OUTPUT"; else echo "worker=false" >> "$GITHUB_OUTPUT"; fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -q '^scripts/\|^\.github/'; then echo "site=true" >> "$GITHUB_OUTPUT"; echo "worker=true" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy site to Cloudflare Pages
        if: steps.changes.outputs.site == 'true'
        run: |
          cd site
          npx --yes wrangler@4 pages deploy . \
            --project-name=bomber-boat \
            --branch=main \
            --commit-message="${{ github.event.head_commit.message }}"

      - name: Deploy worker
        if: steps.changes.outputs.worker == 'true'
        run: |
          cd worker
          npx --yes wrangler@4 deploy --keep-vars

      - name: Postflight (live URL health)
        run: bash scripts/postflight.sh https://bomberboat.com.au
